name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - name: Test
        run: go test ./...

      - name: Build release files
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/tkm-windows-amd64.exe .
          GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/tkm-linux-amd64 .
          cd dist
          sha256sum tkm-windows-amd64.exe tkm-linux-amd64 > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tkm-windows-amd64.exe
            dist/tkm-linux-amd64
            dist/checksums.txt
          generate_release_notes: true
